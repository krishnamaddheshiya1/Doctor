
[build]
  base = "app"
  command = "npm run build"
  publish = "dist/public"

[build.environment]
  VITE_SUPABASE_URL = "https://oigfjwslnobtsthaxxzb.supabase.co"
  VITE_SUPABASE_ANON_KEY = "sb_publishable_Xj2DWBkYCjDrmBBpdd17VQ_z0vsu8zk"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self' https: wss: data: 'unsafe-inline' 'unsafe-eval';"